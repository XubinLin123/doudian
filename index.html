<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抖店快上 - AI商品上架助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 0 30px;
        }

        .header h1 {
            font-size: 32px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 15px;
        }

        .upload-section {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .upload-area {
            border: 2px dashed #c0c4cc;
            border-radius: 12px;
            padding: 60px 40px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: #ff6b6b;
            background: #fff5f5;
        }

        .upload-area.dragover {
            border-color: #ff6b6b;
            background: #fff5f5;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .upload-text {
            font-size: 16px;
            color: #606266;
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 13px;
            color: #909399;
        }

        #fileInput {
            display: none;
        }

        .preview-section {
            display: none;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .preview-section.active {
            display: block;
        }

        .preview-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .preview-image {
            width: 100%;
            border-radius: 12px;
            object-fit: cover;
            max-height: 300px;
        }

        .image-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 8px;
        }

        .info-label {
            font-size: 12px;
            color: #909399;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            color: #1a1a2e;
            font-weight: 500;
        }

        .loading-section {
            display: none;
            background: white;
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .loading-section.active {
            display: block;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #606266;
            font-size: 15px;
        }

        .loading-subtext {
            color: #909399;
            font-size: 13px;
            margin-top: 8px;
        }

        .result-section {
            display: none;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .result-section.active {
            display: block;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .edit-btn {
            background: #f0f2f5;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 13px;
            color: #606266;
            cursor: pointer;
            transition: all 0.2s;
        }

        .edit-btn:hover {
            background: #e4e6e9;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .form-label .tag {
            display: inline-block;
            background: #fff0f0;
            color: #ff6b6b;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: normal;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            font-size: 14px;
            color: #1a1a2e;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 0 3px rgba(255,107,107,0.1);
        }

        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            font-size: 14px;
            color: #1a1a2e;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-textarea:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 0 3px rgba(255,107,107,0.1);
        }

        .selling-points {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .point-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .point-number {
            width: 24px;
            height: 24px;
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .point-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .point-input:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .image-gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .gallery-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item .img-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 11px;
            padding: 4px 8px;
            text-align: center;
        }

        .action-bar {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ebeef5;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
        }

        .btn-secondary {
            background: #f0f2f5;
            color: #606266;
        }

        .btn-secondary:hover {
            background: #e4e6e9;
        }

        .btn-primary {
            background: #ff6b6b;
            color: white;
        }

        .btn-primary:hover {
            background: #ff5252;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255,107,107,0.3);
        }

        .btn-primary:disabled {
            background: #ffcdd2;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .success-section {
            display: none;
            background: white;
            border-radius: 16px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .success-section.active {
            display: block;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: #52c41a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 32px;
        }

        .success-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .success-text {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .success-detail {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            border-radius: 8px;
            padding: 16px;
            text-align: left;
            margin-bottom: 24px;
        }

        .success-detail-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
        }

        .success-detail-label {
            color: #666;
        }

        .success-detail-value {
            color: #1a1a2e;
            font-weight: 500;
        }

        .confidence-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .confidence-high {
            background: #f6ffed;
            color: #52c41a;
        }

        .confidence-medium {
            background: #fffbe6;
            color: #faad14;
        }

        .confidence-low {
            background: #fff2f0;
            color: #ff4d4f;
        }

        .warning-box {
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .warning-box .icon {
            font-size: 18px;
            flex-shrink: 0;
        }

        .warning-box .text {
            font-size: 13px;
            color: #d48806;
            line-height: 1.5;
        }

        @media (max-width: 640px) {
            .container {
                padding: 12px;
            }

            .header {
                padding: 24px 0 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .upload-section,
            .preview-section,
            .loading-section,
            .result-section {
                padding: 24px;
            }

            .preview-grid {
                grid-template-columns: 1fr;
            }

            .image-gallery {
                grid-template-columns: repeat(2, 1fr);
            }

            .action-bar {
                flex-direction: column;
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #dcdfe6;
            transition: all 0.3s;
        }

        .step-dot.active {
            background: #ff6b6b;
            width: 24px;
            border-radius: 4px;
        }

        .step-dot.completed {
            background: #52c41a;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛍️ 抖店快上</h1>
            <p>上传一张商品图，AI自动生成上架材料，你确认后一键发布</p>
        </div>

        <div class="step-indicator" id="stepIndicator">
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>

        <!-- 上传区域 -->
        <div class="upload-section" id="uploadSection">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <div class="upload-text">点击或拖拽上传商品图片</div>
                <div class="upload-hint">支持 JPG、PNG 格式，单张不超过 10MB</div>
            </div>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <!-- 预览区域 -->
        <div class="preview-section" id="previewSection">
            <div class="preview-title">📷 图片预览</div>
            <div class="preview-grid">
                <div>
                    <img class="preview-image" id="previewImage" src="" alt="商品预览">
                </div>
                <div class="image-info">
                    <div class="info-item">
                        <div class="info-label">识别结果</div>
                        <div class="info-value" id="detectedCategory">分析中...</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">置信度</div>
                        <div class="info-value">
                            <span class="confidence-badge confidence-high" id="confidenceBadge">
                                <span id="confidenceValue">--</span>
                            </span>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">文件信息</div>
                        <div class="info-value" id="fileInfo">--</div>
                    </div>
                </div>
            </div>
            <div class="action-bar">
                <button class="btn btn-secondary" onclick="resetUpload()">重新上传</button>
                <button class="btn btn-primary" onclick="startGenerate()">开始生成上架材料</button>
            </div>
        </div>

        <!-- 加载区域 -->
        <div class="loading-section" id="loadingSection">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">AI 正在分析商品图片...</div>
            <div class="loading-subtext" id="loadingSubtext">识别商品类别、风格、属性</div>
        </div>

        <!-- 结果区域 -->
        <div class="result-section" id="resultSection">
            <div class="warning-box">
                <span class="icon">⚠️</span>
                <span class="text">以下内容由 AI 生成，请仔细核对后再发布。关键信息错误可能导致商品下架或流量降权。</span>
            </div>

            <div class="section-header">
                <div class="section-title">📝 商品信息</div>
                <button class="edit-btn" onclick="toggleEdit()">✏️ 编辑</button>
            </div>

            <div class="form-group">
                <label class="form-label">
                    商品标题
                    <span class="tag">AI生成</span>
                </label>
                <input type="text" class="form-input" id="productTitle" value="" readonly>
            </div>

            <div class="form-group">
                <label class="form-label">
                    商品类目
                    <span class="tag">AI识别</span>
                </label>
                <input type="text" class="form-input" id="productCategory" value="" readonly>
            </div>

            <div class="form-group">
                <label class="form-label">
                    核心卖点
                    <span class="tag">AI生成</span>
                </label>
                <div class="selling-points" id="sellingPoints">
                    <!-- 动态生成 -->
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    商品详情
                    <span class="tag">AI生成</span>
                </label>
                <textarea class="form-textarea" id="productDetail" readonly></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">
                    生成图片
                    <span class="tag">AI处理</span>
                </label>
                <div class="image-gallery" id="imageGallery">
                    <!-- 动态生成 -->
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">价格建议</label>
                <input type="text" class="form-input" id="priceSuggest" value="" readonly>
            </div>

            <div class="action-bar">
                <button class="btn btn-secondary" onclick="regenerate()">🔄 重新生成</button>
                <button class="btn btn-primary" id="publishBtn" onclick="publishProduct()">
                    ✅ 确认并发布到抖店
                </button>
            </div>
        </div>

        <!-- 成功区域 -->
        <div class="success-section" id="successSection">
            <div class="success-icon">✓</div>
            <div class="success-title">发布成功！</div>
            <div class="success-text">商品已进入抖店审核队列，通常 10-30 分钟内完成审核</div>
            <div class="success-detail">
                <div class="success-detail-item">
                    <span class="success-detail-label">商品标题</span>
                    <span class="success-detail-value" id="successTitle">--</span>
                </div>
                <div class="success-detail-item">
                    <span class="success-detail-label">商品ID</span>
                    <span class="success-detail-value" id="successId">--</span>
                </div>
                <div class="success-detail-item">
                    <span class="success-detail-label">审核状态</span>
                    <span class="success-detail-value">待审核</span>
                </div>
                <div class="success-detail-item">
                    <span class="success-detail-label">发布时间</span>
                    <span class="success-detail-value" id="successTime">--</span>
                </div>
            </div>
            <button class="btn btn-primary" onclick="resetAll()">继续上架下一个商品</button>
        </div>
    </div>

    <script>
        // 状态管理
        let currentStep = 0;
        let uploadedFile = null;
        let isEditing = false;
        let generatedData = null;

        // DOM 元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadSection = document.getElementById('uploadSection');
        const previewSection = document.getElementById('previewSection');
        const loadingSection = document.getElementById('loadingSection');
        const resultSection = document.getElementById('resultSection');
        const successSection = document.getElementById('successSection');
        const previewImage = document.getElementById('previewImage');
        const stepIndicator = document.getElementById('stepIndicator');

        // 点击上传
        uploadArea.addEventListener('click', () => fileInput.click());

        // 文件选择
        fileInput.addEventListener('change', handleFileSelect);

        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) handleFile(file);
        }

        function handleFile(file) {
            // 验证
            if (!file.type.startsWith('image/')) {
                alert('请上传图片文件');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                alert('图片大小不能超过 10MB');
                return;
            }

            uploadedFile = file;

            // 显示预览
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                document.getElementById('fileInfo').textContent = 
                    `${file.name} · ${(file.size / 1024).toFixed(1)} KB`;

                // 模拟AI识别
                setTimeout(() => {
                    document.getElementById('detectedCategory').textContent = '法式碎花连衣裙';
                    document.getElementById('confidenceValue').textContent = '92%';
                    document.getElementById('confidenceBadge').className = 'confidence-badge confidence-high';
                }, 500);
            };
            reader.readAsDataURL(file);

            // 切换界面
            uploadSection.style.display = 'none';
            previewSection.classList.add('active', 'fade-in');
            updateStep(1);
        }

        function resetUpload() {
            uploadedFile = null;
            fileInput.value = '';
            previewSection.classList.remove('active');
            uploadSection.style.display = 'block';
            updateStep(0);
        }

        function startGenerate() {
            previewSection.classList.remove('active');
            loadingSection.classList.add('active');
            updateStep(2);

            // 模拟AI生成过程
            const steps = [
                { text: 'AI 正在分析商品图片...', sub: '识别商品类别、风格、属性' },
                { text: '正在生成商品标题...', sub: '结合热搜词和平台规则' },
                { text: '正在撰写卖点文案...', sub: '突出痛点与解决方案' },
                { text: '正在处理商品图片...', sub: '抠图、生成场景图、优化' },
                { text: '正在校验合规性...', sub: '违禁词检测、类目匹配' }
            ];

            let currentStep = 0;
            const interval = setInterval(() => {
                if (currentStep < steps.length) {
                    document.getElementById('loadingText').textContent = steps[currentStep].text;
                    document.getElementById('loadingSubtext').textContent = steps[currentStep].sub;
                    currentStep++;
                } else {
                    clearInterval(interval);
                    showResult();
                }
            }, 800);
        }

        function showResult() {
            loadingSection.classList.remove('active');
            resultSection.classList.add('active', 'fade-in');
            updateStep(3);

            // 模拟生成数据
            generatedData = {
                title: '2024夏季新款法式碎花连衣裙女收腰显瘦气质中长款雪纺度假风裙子',
                category: '女装 > 连衣裙 > 碎花连衣裙',
                sellingPoints: [
                    '法式碎花设计，浪漫优雅，出游拍照超出片',
                    '高腰收腰剪裁，视觉拉长比例，显瘦显高',
                    '轻薄雪纺面料，透气不闷热，夏日穿着舒适',
                    '中长款版型，遮肉显瘦，不挑身材好驾驭',
                    '多色可选，满足不同风格搭配需求'
                ],
                detail: '【面料】优质雪纺，轻盈透气，亲肤不扎肉
【版型】高腰A字版型，收腰显瘦
【尺码】S/M/L/XL，详见尺码表
【场景】约会、度假、日常通勤、拍照
【洗涤】建议手洗或轻柔机洗，避免暴晒',
                images: [
                    { url: previewImage.src, label: '原图' },
                    { url: previewImage.src, label: '白底图' },
                    { url: previewImage.src, label: '场景图' }
                ],
                price: '建议售价 ¥128-168（同类商品均价 ¥145，建议定价 ¥139 有竞争力）'
            };

            // 填充表单
            document.getElementById('productTitle').value = generatedData.title;
            document.getElementById('productCategory').value = generatedData.category;
            document.getElementById('productDetail').value = generatedData.detail;
            document.getElementById('priceSuggest').value = generatedData.price;

            // 填充卖点
            const pointsContainer = document.getElementById('sellingPoints');
            pointsContainer.innerHTML = generatedData.sellingPoints.map((point, i) => `
                <div class="point-item">
                    <span class="point-number">${i + 1}</span>
                    <input type="text" class="point-input" value="${point}" readonly>
                </div>
            `).join('');

            // 填充图片
            const gallery = document.getElementById('imageGallery');
            gallery.innerHTML = generatedData.images.map(img => `
                <div class="gallery-item">
                    <img src="${img.url}" alt="${img.label}">
                    <div class="img-label">${img.label}</div>
                </div>
            `).join('');
        }

        function toggleEdit() {
            isEditing = !isEditing;
            const inputs = resultSection.querySelectorAll('.form-input, .form-textarea, .point-input');
            inputs.forEach(input => {
                input.readOnly = !isEditing;
                if (isEditing) {
                    input.style.background = '#fff';
                    input.style.borderColor = '#ff6b6b';
                } else {
                    input.style.background = '';
                    input.style.borderColor = '';
                }
            });
            document.querySelector('.edit-btn').textContent = isEditing ? '💾 保存' : '✏️ 编辑';
        }

        function regenerate() {
            resultSection.classList.remove('active');
            loadingSection.classList.add('active');
            updateStep(2);

            document.getElementById('loadingText').textContent = '正在重新生成...';
            document.getElementById('loadingSubtext').textContent = '尝试不同的文案风格';

            setTimeout(() => {
                // 稍微修改数据模拟重新生成
                generatedData.title = generatedData.title.replace('法式碎花', '复古碎花');
                showResult();
            }, 2000);
        }

        function publishProduct() {
            const btn = document.getElementById('publishBtn');
            btn.disabled = true;
            btn.textContent = '发布中...';

            // 模拟发布
            setTimeout(() => {
                resultSection.classList.remove('active');
                successSection.classList.add('active', 'fade-in');
                updateStep(4);

                document.getElementById('successTitle').textContent = 
                    document.getElementById('productTitle').value.substring(0, 20) + '...';
                document.getElementById('successId').textContent = 'SP' + Date.now();
                document.getElementById('successTime').textContent = new Date().toLocaleString('zh-CN');

                btn.disabled = false;
                btn.textContent = '✅ 确认并发布到抖店';
            }, 1500);
        }

        function resetAll() {
            successSection.classList.remove('active');
            uploadSection.style.display = 'block';
            uploadedFile = null;
            fileInput.value = '';
            isEditing = false;
            updateStep(0);
        }

        function updateStep(step) {
            currentStep = step;
            const dots = stepIndicator.querySelectorAll('.step-dot');
            dots.forEach((dot, i) => {
                dot.classList.remove('active', 'completed');
                if (i < step) {
                    dot.classList.add('completed');
                } else if (i === step) {
                    dot.classList.add('active');
                }
            });
        }
    </script>
</body>
</html>
