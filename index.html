	<!DOCTYPE html>
	<html lang="zh-CN">
	<head>
	  <meta charset="UTF-8">
	  <meta name="viewport" content="width=device-width, initial-scale=1.0">
	  <title>AI 智能商品素材生成器</title>
	  <script src="https://cdn.tailwindcss.com"></script>
	  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
	  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
	  <style>
	    body { font-family: 'Noto Sans SC', sans-serif; background: #f3f4f6; }
	    .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.5); }
	    .loading-dots span { animation: blink 1.4s infinite both; }
	    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
	    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
	    @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
	    .fade-enter-active, .fade-leave-active { transition: opacity 0.5s ease; }
	    .fade-enter-from, .fade-leave-to { opacity: 0; }
	  </style>
	</head>
	<body class="text-gray-800">
	  <div id="app" class="min-h-screen flex flex-col items-center py-10 px-4">
	    <header class="text-center mb-12">
	      <h1 class="text-4xl font-bold text-indigo-600 mb-3">AI 智能商品素材生成器</h1>
	      <p class="text-gray-500">上传商品图 → AI 视觉识别 → 智能文案生成 → 一键发布抖店</p>
	    </header>
	    <div class="w-full max-w-5xl glass-panel rounded-3xl shadow-xl p-8 md:p-12">
	      <!-- 步骤 1: 上传区 -->
	      <div v-if="step === 1" class="flex flex-col items-center">
	        <div 
	          @dragover.prevent="isDragging = true" 
	          @dragleave.prevent="isDragging = false" 
	          @drop.prevent="handleDrop"
	          :class="isDragging ? 'border-indigo-500 bg-indigo-50' : 'border-gray-300 bg-gray-50'"
	          class="w-full max-w-md border-2 border-dashed rounded-2xl p-8 text-center cursor-pointer transition-all hover:border-indigo-400"
	          @click="triggerFileInput"
	        >
	          <input type="file" ref="fileInput" @change="handleFileUpload" accept="image/*" class="hidden">
	          <svg class="mx-auto h-16 w-16 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
	            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
	          </svg>
	          <p class="text-lg font-medium text-gray-700">点击或拖拽上传商品图片</p>
	          <p class="text-sm text-gray-400 mt-2">支持 JPG / PNG / WEBP 格式</p>
	        </div>
	      </div>
	      <!-- 步骤 2: AI 分析中 -->
	      <div v-if="step === 2" class="flex flex-col items-center justify-center py-12">
	        <div class="relative mb-8">
	          <img :src="previewImage" class="w-48 h-48 object-cover rounded-2xl shadow-lg" alt="preview">
	          <div class="absolute inset-0 bg-black bg-opacity-40 rounded-2xl flex items-center justify-center">
	            <div class="loading-dots flex space-x-2">
	              <span class="w-3 h-3 bg-white rounded-full inline-block"></span>
	              <span class="w-3 h-3 bg-white rounded-full inline-block"></span>
	              <span class="w-3 h-3 bg-white rounded-full inline-block"></span>
	            </div>
	          </div>
	        </div>
	        <p class="text-xl font-medium text-indigo-600 mb-2">AI 正在解析商品信息...</p>
	        <p class="text-gray-400 text-sm">Qwen-VL 视觉识别中，随后 DeepSeek 正在构思文案</p>
	      </div>
	      <!-- 步骤 3: 结果确认与发布 -->
	      <transition name="fade" mode="out-in">
	        <div v-if="step === 3" class="space-y-8">
	          <div class="flex flex-col md:flex-row gap-8">
	            <!-- 预览图 -->
	            <div class="md:w-1/3">
	              <img :src="previewImage" class="w-full rounded-xl shadow-md" alt="商品图">
	            </div>
	            <!-- AI 生成结果 -->
	            <div class="md:w-2/3 space-y-6">
	              <div>
	                <h3 class="text-lg font-bold text-gray-800 mb-2 flex items-center">
	                  <span class="w-2 h-6 bg-indigo-500 rounded mr-2"></span>商品基础信息
	                </h3>
	                <div class="bg-gray-50 rounded-lg p-4 text-sm">
	                  <p><span class="text-gray-500">商品名称：</span>{{ result.product.name }}</p>
	                  <p class="mt-1"><span class="text-gray-500">商品分类：</span>{{ result.product.category }}</p>
	                  <p class="mt-1"><span class="text-gray-500">主要材质：</span>{{ result.product.material }}</p>
	                  <div class="mt-2">
	                    <span class="text-gray-500 block mb-1">核心卖点：</span>
	                    <ul class="list-disc list-inside text-gray-700">
	                      <li v-for="(feature, idx) in result.product.features" :key="idx">{{ feature }}</li>
	                    </ul>
	                  </div>
	                </div>
	              </div>
	              <div>
	                <h3 class="text-lg font-bold text-gray-800 mb-2 flex items-center">
	                  <span class="w-2 h-6 bg-pink-500 rounded mr-2"></span>AI 营销文案
	                </h3>
	                <div class="bg-pink-50 rounded-lg p-4">
	                  <input v-model="result.marketing.title" class="w-full bg-transparent border-b border-pink-200 focus:outline-none text-pink-700 font-bold text-lg mb-2">
	                  <textarea v-model="result.marketing.copywriting" class="w-full bg-transparent text-gray-600 text-sm focus:outline-none resize-none" rows="4"></textarea>
	                </div>
	              </div>
	            </div>
	          </div>
	          <!-- 操作区 -->
	          <div class="flex justify-end space-x-4 pt-4 border-t border-gray-100">
	            <button @click="resetProcess" class="px-6 py-2.5 rounded-full text-gray-600 bg-gray-100 hover:bg-gray-200 transition font-medium">
	              重新上传
	            </button>
	            <button @click="publishToDoudian" :disabled="isPublishing" class="px-8 py-2.5 rounded-full text-white bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 transition font-medium shadow-md disabled:opacity-50">
	              {{ isPublishing ? '发布中...' : '确认并发布' }}
	            </button>
	          </div>
	        </div>
	      </transition>
	    </div>
	  </div>
	  <script>
	    const { createApp, ref, reactive } = Vue;
	    // 替换为你的 Vercel 后端地址
	    const API_BASE_URL = 'https://doudian-git-main-hhlucas.vercel.app/api'; // 部署中查找后端域名
	    createApp({
	      setup() {
	        const step = ref(1);
	        const isDragging = ref(false);
	        const fileInput = ref(null);
	        const previewImage = ref('');
	        const isPublishing = ref(false);
	        const result = reactive({
	          product: {},
	          marketing: {}
	        });
	        // 压缩图片防止 Base64 过大
	        const compressImage = (file) => {
	          return new Promise((resolve) => {
	            const reader = new FileReader();
	            reader.onload = (e) => {
	              const img = new Image();
	              img.onload = () => {
	                const canvas = document.createElement('canvas');
	                const ctx = canvas.getContext('2d');
	                const MAX_WIDTH = 800;
	                let width = img.width;
	                let height = img.height;
	                if (width > MAX_WIDTH) {
	                  height = (MAX_WIDTH / width) * height;
	                  width = MAX_WIDTH;
	                }
	                canvas.width = width;
	                canvas.height = height;
	                ctx.drawImage(img, 0, 0, width, height);
	                resolve(canvas.toDataURL('image/jpeg', 0.8));
	              };
	              img.src = e.target.result;
	            };
	            reader.readAsDataURL(file);
	          });
	        };
	        const processFile = async (file) => {
	          if (!file.type.startsWith('image/')) return;
	          previewImage.value = await compressImage(file);
	          step.value = 2;
	          await generateMaterial();
	        };
	        const handleFileUpload = (e) => {
	          const file = e.target.files[0];
	          if (file) processFile(file);
	        };
	        const handleDrop = (e) => {
	          isDragging.value = false;
	          const file = e.dataTransfer.files[0];
	          if (file) processFile(file);
	        };
	        const generateMaterial = async () => {
	          try {
	            const response = await fetch(`${API_BASE_URL}generate`, {
	              method: 'POST',
	              headers: { 'Content-Type': 'application/json' },
	              body: JSON.stringify({ imageBase64: previewImage.value })
	            });
	            const data = await response.json();
	            if (data.success) {
	              result.product = data.data.product;
	              result.marketing = data.data.marketing;
	              step.value = 3;
	            } else {
	              alert('生成失败，请重试');
	              resetProcess();
	            }
	          } catch (error) {
	            alert('网络错误，请检查API配置');
	            resetProcess();
	          }
	        };
	        const publishToDoudian = async () => {
	          isPublishing.value = true;
	          try {
	            const response = await fetch(`${API_BASE_URL}publish`, {
	              method: 'POST',
	              headers: { 'Content-Type': 'application/json' },
	              body: JSON.stringify({ finalData: result })
	            });
	            const data = await response.json();
	            if (data.success) {
	              alert('已成功加入发布队列！');
	              resetProcess();
	            }
	          } catch (error) {
	            alert('发布失败，请重试');
	          } finally {
	            isPublishing.value = false;
	          }
	        };
	        const resetProcess = () => {
	          step.value = 1;
	          previewImage.value = '';
	          result.product = {};
	          result.marketing = {};
	          if (fileInput.value) fileInput.value.value = '';
	        };
	        return {
	          step, isDragging, fileInput, previewImage, result,
	          isPublishing, triggerFileInput: () => fileInput.value?.click(),
	          handleFileUpload, handleDrop, publishToDoudian, resetProcess
	        };
	      }
	    }).mount('#app');
	  </script>
	</body>
	</html>
